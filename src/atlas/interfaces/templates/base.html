<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>Atlas — {% block title %}Dashboard{% endblock %}</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Cascadia Code',Consolas,monospace;background:#0d1117;color:#c9d1d9;font-size:14px}
    nav{background:#161b22;border-bottom:1px solid #30363d;padding:10px 24px;display:flex;align-items:center;gap:24px}
    nav .brand{color:#58a6ff;font-weight:bold;font-size:16px;text-decoration:none;margin-right:8px}
    nav a{color:#8b949e;text-decoration:none;padding:4px 8px;border-radius:4px;transition:color .15s}
    nav a:hover,nav a.active{color:#c9d1d9;background:#21262d}
    .container{padding:24px;max-width:1280px;margin:0 auto}
    h2{color:#58a6ff;font-size:16px;margin-bottom:16px;border-bottom:1px solid #21262d;padding-bottom:8px}
    h3{color:#8b949e;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:24px}
    .card{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:16px}
    .card-label{font-size:11px;color:#8b949e;text-transform:uppercase;letter-spacing:1px}
    .card-value{font-size:24px;font-weight:bold;margin-top:6px}
    .card-sub{font-size:12px;color:#8b949e;margin-top:4px}
    table{width:100%;border-collapse:collapse;background:#161b22;border-radius:6px;overflow:hidden;border:1px solid #30363d}
    th{background:#0d1117;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8b949e;border-bottom:2px solid #21262d}
    td{padding:10px 14px;border-bottom:1px solid #21262d;font-size:13px}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#1c2128}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold}
    .ok{background:#1a3d2b;color:#3fb950;border:1px solid #2ea043}
    .warn{background:#3d2f1a;color:#e3b341;border:1px solid #9e6a03}
    .err{background:#3d1a1a;color:#f85149;border:1px solid #b91c1c}
    .dim{color:#8b949e}
    .mono{font-family:monospace;font-size:12px;word-break:break-all}
    .footer{color:#8b949e;font-size:11px;margin-top:24px;text-align:right}
    .section{margin-bottom:28px}
  </style>
</head>
<body>
<nav>
  <a class="brand" href="/">⬡ Atlas</a>
  <a href="/" {% if page=='status' %}class="active"{% endif %}>Estado</a>
  <a href="/tasks" {% if page=='tasks' %}class="active"{% endif %}>Tareas</a>
  <a href="/audit" {% if page=='audit' %}class="active"{% endif %}>Audit</a>
  <a href="/memory" {% if page=='memory' %}class="active"{% endif %}>Memoria</a>
  <a href="/tools" {% if page=='tools' %}class="active"{% endif %}>Herramientas</a>
  <a href="/providers" {% if page=='providers' %}class="active"{% endif %}>Proveedores</a>
  <a href="/observability" {% if page=='observability' %}class="active"{% endif %}>Observability</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
  <div class="footer">Atlas Dashboard — recarga cada 30s &nbsp;|&nbsp; localhost:7331</div>
</div>
</body>
</html>
