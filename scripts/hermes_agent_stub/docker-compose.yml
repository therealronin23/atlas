services:
  hermes-agent:
    build: .
    image: hermes-agent-stub:0.1
    container_name: hermes-agent
    restart: unless-stopped
    env_file:
      - /opt/hermes/.env
    ports:
      - "8443:8443"
    volumes:
      - /opt/hermes/data:/data
      - /opt/hermes/logs:/logs
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8443)); s.close()"]
      interval: 30s
      timeout: 3s
      retries: 3
