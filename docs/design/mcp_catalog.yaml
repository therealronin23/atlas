# Catálogo MCP estructurado v3 — clasificado por DOMINIO humano (sector → subsector).
#
# Nombres autoexplicativos (sin manual) + alias para que se encuentre como cada uno lo diga.
# Fuente MÁQUINA: lo consume atlas.mcp.catalog (load_catalog + load_taxonomy) + el tronco.
# Narrativa humana / orígenes: mcp_catalog.md. Sembrado del registro: mcp_catalog_seeded.yaml.
#
# Estado por entrada: candidato (sin verificar, NO se instala) · verificado (prove-it OK) · instalado.
# Solapamiento: una entrada puede repetirse en varios sectores vía `tags` (sector = vista, no carpeta).
# Orden de navegación: madurez-first (instalado→verificado→candidato) y `phase` donde sea desarrollo nuestro.

sectors:

  programacion:
    label: Programación
    desc: Hacer software — escribir, revisar, probar y entregar código.
    aliases: [programming, coding, dev, desarrollo, python, javascript, typescript, golang, rust, java, php, ruby, tdd, linter, debugger, refactor, snippet, codebase, repository, repo, git]
    subsectors:
      frontend: {label: Frontend, aliases: [front, web, react]}
      backend: {label: Backend, aliases: [server, api]}
      testing: {label: Testing, aliases: [tests, qa, e2e]}
      code-review: {label: Code review, aliases: [review, calidad, tdd]}
      cicd: {label: CI/CD, aliases: [ci, pipelines, automation]}
    entries:
      - {name: atlas-coding-discipline, kind: skill, subsector: code-review, mode: served, source: "docs/skills/atlas-coding-discipline.md", purpose: "máximas del repo (NUESTRO)", tags: [programacion, productividad], status: instalado}
      - {name: everything, kind: mcp, subsector: testing, install: "npx -y @modelcontextprotocol/server-everything", transport: stdio, trust: vetted, purpose: "server de referencia MCP (prove-it OK 2026-06-21)", status: verificado}
      - {name: Code Reviewer / TDD, kind: skill, subsector: code-review, purpose: "review + TDD + simplify", status: candidato}
      - {name: Karpathy Guidelines, kind: skill, subsector: code-review, purpose: "reglas de coding limpio", status: candidato}
      - {name: vercel-react-best-practices, kind: skill, subsector: frontend, mode: installed, source: "vercel-labs/agent-skills", install: "npx skills add vercel-labs/agent-skills --skill vercel-react-best-practices", purpose: "patrones React/Next (instalado E2E vía npx skills 2026-06-22)", tags: [programacion, diseno], trust: vetted, status: instalado}
      - {name: Playwright / WebApp Testing, kind: mcp, subsector: testing, install: "npx -y @playwright/mcp@latest", transport: stdio, trust: vetted, purpose: "navegación/scraping vía árbol de accesibilidad (23 tools, prove-it OK 2026-07-02, sub-100ms, muchos menos tokens que screenshot-based)", tags: [programacion, ciberseguridad], status: verificado, read_only_tools: [browser_snapshot, browser_console_messages, browser_network_requests, browser_network_request, browser_take_screenshot]}
      - {name: GitHub MCP, kind: mcp, subsector: cicd, source: "github/github-mcp-server", install: "docker run -i --rm -e GITHUB_PERSONAL_ACCESS_TOKEN ghcr.io/github/github-mcp-server", transport: stdio, env_passthrough: [GITHUB_PERSONAL_ACCESS_TOKEN], purpose: "repos, issues, PRs y code search; vendor-maintained, candidato prioritario 2026", tags: [programacion, infraestructura], trust: research-2026, status: candidato}
      - {name: WarpGrep, kind: tool, subsector: cicd, purpose: "búsqueda ultrarrápida en repos (Codex)", status: candidato}
      - {name: gh-fix-ci, kind: tool, subsector: cicd, purpose: "arregla CI fallido en background (Codex)", status: candidato}

  diseno:
    label: Diseño
    desc: Interfaces y estética — UI, UX y gráfico.
    aliases: [design, ui, ux, frontend-design, css, tailwind, image, icon, svg, font, color, layout, theme, brand]
    subsectors:
      ui: {label: UI, aliases: [interfaz, componentes]}
      ux: {label: UX, aliases: [usabilidad, accesibilidad]}
      grafico: {label: Gráfico, aliases: [visual, figma]}
    entries:
      - {name: Frontend Design / Senior Frontend, kind: skill, subsector: ui, purpose: "UI production-grade", tags: [diseno, programacion], status: candidato}
      - {name: UI UX Pro Max, kind: skill, subsector: ui, purpose: "paletas/tipografía/componentes", status: candidato}
      - {name: Figma (MCP / Implement Design), kind: mcp, subsector: grafico, source: "developers.figma.com/docs/figma-mcp-server", purpose: "Figma → código/design context; vendor-maintained, candidato prioritario 2026", tags: [diseno, programacion], trust: research-2026, status: candidato}
      - {name: web-design-guidelines, kind: skill, subsector: ux, mode: installed, source: "vercel-labs/agent-skills", install: "npx skills add vercel-labs/agent-skills --skill web-design-guidelines", purpose: "auditoría UX/accesibilidad (instalado E2E)", trust: vetted, status: instalado}

  ciberseguridad:
    label: Ciberseguridad
    desc: Atacar y defender — pentesting, defensa, auditoría y secretos.
    aliases: [security, seguridad, infosec, cyber, vulnerability, vuln, cve, exploit, scan, auth, oauth, encryption, crypto, malware, threat, audit, compliance]
    subsectors:
      pentesting: {label: Pentesting, aliases: [redteam, ofensiva, ataque]}
      defensa: {label: Defensa, aliases: [blueteam, hardening]}
      auditoria: {label: Auditoría, aliases: [audit, vulnerabilidades]}
      secretos: {label: Secretos, aliases: [secrets, credenciales]}
    entries:
      - {name: Trail of Bits Security, kind: skill, subsector: auditoria, purpose: "vulnerabilidades", status: candidato}

  datos:
    label: Datos
    desc: Bases de datos, análisis y extracción.
    aliases: [data, database, db, sql, postgres, mysql, mongodb, analytics, etl, csv, json, bigquery, warehouse, spreadsheet, excel, dataset, finance, financial, payments, stocks, crypto-market]
    subsectors:
      bases-de-datos: {label: Bases de datos, aliases: [sql, postgres]}
      analisis: {label: Análisis, aliases: [analytics, insights]}
      scraping: {label: Scraping/ETL, aliases: [etl, ingesta]}
    entries:
      - {name: Postgres / Supabase, kind: mcp, subsector: bases-de-datos, source: "supabase/mcp", purpose: "queries DB y gestión Supabase; vendor-maintained, requiere tokens/scopes estrictos", tags: [datos, infraestructura], trust: research-2026, status: candidato}
      - {name: Stripe MCP, kind: mcp, subsector: analisis, source: "stripe", purpose: "pagos, clientes y reporting financiero; vendor-maintained, alto riesgo mutating/HITL", tags: [datos, productividad], trust: research-2026, status: candidato}

  investigacion:
    label: Investigación
    desc: Buscar, leer y sintetizar — web, académico y documentación.
    aliases: [research, search, busqueda, scrape, crawl, news, wiki, web-search, browser, fetch, papers, arxiv, academic, scholar]
    subsectors:
      web: {label: Web, aliases: [scraping, search, navegacion]}
      academico: {label: Académico, aliases: [papers, citas, zotero]}
      documentacion: {label: Documentación, aliases: [docs, context]}
    entries:
      - {name: Firecrawl, kind: mcp, subsector: web, purpose: "búsqueda/scraping/contexto vivo", status: candidato}
      - {name: Valyu, kind: tool, subsector: web, purpose: "research", status: candidato}
      - {name: Context7, kind: mcp, subsector: documentacion, source: "upstash/context7", install: "npx -y @upstash/context7-mcp", transport: stdio, purpose: "documentación viva/versionada para código; candidato prioritario 2026", tags: [investigacion, programacion], trust: research-2026, status: candidato}
      - {name: Fetch, kind: mcp, subsector: web, source: "modelcontextprotocol/servers", purpose: "fetch web básico de referencia MCP; alternativa ligera a browser/scraper", tags: [investigacion, programacion], trust: research-2026, status: candidato}
      - {name: Brave Search, kind: mcp, subsector: web, purpose: "búsqueda web", status: candidato}
      - {name: Tavily Search, kind: mcp, subsector: web, source: "tavily", purpose: "web search/research API con scoring; requiere token", tags: [investigacion], trust: research-2026, status: candidato}
      - {name: Perplexity MCP, kind: mcp, subsector: web, source: "perplexity", purpose: "research web con respuestas citadas; requiere token", tags: [investigacion], trust: research-2026, status: candidato}
      - {name: Zotero MCP, kind: mcp, subsector: academico, purpose: "papers/citas", status: candidato}
      - {name: Scientific Skills (LaTeX/papers), kind: skill, subsector: academico, purpose: "papers/visualizaciones", status: candidato}

  conocimiento-memoria:
    label: Conocimiento y memoria
    desc: Saber y recordar entre sesiones — memoria, grafos y fuentes.
    aliases: [knowledge, memory, memoria, conocimiento, vector, embedding, rag, notes, zettelkasten, graph, recall, context, semantic]
    subsectors:
      memoria: {label: Memoria, aliases: [recall, persistencia]}
      grafos: {label: Grafos de conocimiento, aliases: [graph, kg, entidades]}
      fuentes: {label: Fuentes/APIs, aliases: [apis, sources, ingesta]}
    entries:
      - {name: atlas-memory, kind: mcp, subsector: memoria, source: atlas.mcp.memory_server, purpose: "sustrato verificable (NUESTRO): recall/add/supersede/shred para continuidad entre sesiones", install: "claude mcp add atlas-memory", status: instalado, best_for: [recordar preferencias, recuperar lecciones, continuidad], examples: ["recordar una decisión", "recuperar errores previos parecidos"]}
      - {name: atlas-graph, kind: mcp, subsector: grafos, source: atlas.mcp.graph_server, purpose: "grafo vivo del proyecto (Kuzu): quién importa X, blast radius, linaje temporal, churn — entender Atlas SIN leer docs (NUESTRO, verificado 19/19 vs grep 2026-07-09)", install: "python -m atlas.mcp.graph_server", tags: [conocimiento-memoria, programacion], status: instalado, best_for: [refactor, blast-radius, lineage, codebase-map], examples: ["qué toca este módulo", "blast radius antes de editar"]}
      - {name: atlas-knowledge, kind: mcp, subsector: fuentes, source: atlas.mcp.knowledge_server, purpose: "knowledge-src → run_mission (NUESTRO): APIs libres con procedencia para research barato", install: "claude mcp add atlas-knowledge", status: instalado, best_for: [research, datos abiertos, ingestion], examples: ["consulta Wikipedia", "ingiere indicador World Bank"]}
      - {name: Wikipedia REST, kind: api, subsector: fuentes, mode: served, source: "atlas.mcp.knowledge_trunk:WikipediaSource", purpose: "summary API (NUESTRO)", tags: [conocimiento-memoria, investigacion], status: instalado}
      - {name: World Bank, kind: api, subsector: fuentes, mode: served, source: "atlas.mcp.knowledge_trunk:WorldBankSource", purpose: "indicadores abiertos (NUESTRO)", tags: [conocimiento-memoria, datos], status: instalado}
      - {name: Open-Meteo, kind: api, subsector: fuentes, mode: served, source: "atlas.mcp.knowledge_trunk:OpenMeteoSource", purpose: "clima sin auth (NUESTRO, prove-it E2E)", tags: [conocimiento-memoria, datos], trust: vetted, status: instalado}
      - {name: Frankfurter, kind: api, subsector: fuentes, mode: served, source: "atlas.mcp.knowledge_trunk:FrankfurterSource", purpose: "tipos de cambio sin auth (NUESTRO, prove-it E2E)", tags: [conocimiento-memoria, datos], trust: vetted, status: instalado}
      - {name: mcp-memory, kind: mcp, subsector: grafos, install: "npx -y @modelcontextprotocol/server-memory", transport: stdio, trust: vetted, purpose: "knowledge graph oficial (benchmark; prove-it OK). Complementa nuestro sustrato verificable", status: verificado}
      - {name: Graphiti MCP, kind: mcp, subsector: grafos, purpose: "shared memory Claude↔Cursor", status: candidato}
      - {name: Memory Keeper, kind: mcp, subsector: memoria, source: "mkreyman/mcp-memory-keeper", purpose: "historia/decisiones", status: candidato}

  productividad:
    label: Productividad
    desc: Gestión, comunicación y ofimática.
    aliases: [productivity, oficina, office, calendar, email, crm, notion, jira, trello, asana, slack, linear, automation, zapier, n8n, workflow, integration, saas, scheduling, tasks, project]
    subsectors:
      gestion: {label: Gestión, aliases: [tickets, tasks, linear, jira]}
      comunicacion: {label: Comunicación, aliases: [chat, slack]}
      ofimatica: {label: Ofimática, aliases: [docs, pdf, excel]}
    entries:
      - {name: google-workspace, kind: mcp, subsector: gestion, install: "uvx workspace-mcp --tool-tier core", transport: stdio, env_passthrough: [GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET], source: "taylorwilsdon/google_workspace_mcp", purpose: "Gmail/Calendar/Drive/Docs/Sheets con tu cuenta Google (OAuth). 45 tools, ✔ Connected. OAuth de navegador al primer uso", tags: [productividad, conocimiento-memoria], trust: vetted, status: instalado}
      - {name: Linear, kind: mcp, subsector: gestion, purpose: "tickets", status: candidato}
      - {name: Notion MCP, kind: mcp, subsector: gestion, source: "notion", purpose: "workspace/docs/tareas; vendor-hosted suele requerir OAuth MCP, candidato 2026", tags: [productividad, conocimiento-memoria], trust: research-2026, status: candidato}
      - {name: Slack, kind: mcp, subsector: comunicacion, purpose: "comunicación", status: candidato}
      - {name: Sentry MCP, kind: mcp, subsector: gestion, source: "sentry", purpose: "errores, issues y observabilidad de producto; candidato 2026 para debugging", tags: [productividad, programacion, infraestructura], trust: research-2026, status: candidato}
      - {name: Document Skills (PDF/DOCX/XLSX/PPTX), kind: skill, subsector: ofimatica, purpose: "ofimática", tags: [productividad, datos], status: candidato}
      - {name: writing-guidelines, kind: skill, subsector: ofimatica, mode: installed, source: "vercel-labs/agent-skills", install: "npx skills add vercel-labs/agent-skills --skill writing-guidelines", purpose: "guías de escritura/contenido (instalado E2E)", trust: vetted, status: instalado}

  ia-agentes:
    label: IA y agentes
    desc: Construir y orquestar agentes — orquestación, builders y planificación.
    aliases: [ai, agents, agentes, llm, orquestacion, gpt, model, prompt, chain, openai, anthropic, claude, gemini, ml, machine-learning, inference, fine-tuning, multiagent]
    subsectors:
      orquestacion: {label: Orquestación, aliases: [multiagente, aggregator, tronco]}
      builders: {label: Builders, aliases: [mcp-builder, crear]}
      prompting: {label: Prompting, aliases: [prompts, system-prompt]}
      planning: {label: Planificación, aliases: [plan, reasoning, grill]}
    entries:
      - {name: Superpowers, kind: plugin, subsector: orquestacion, source: "plugin", purpose: "orquestación multi-agente (plugin Claude, no skill markdown)", status: instalado}
      - {name: MCP Builder, kind: skill, subsector: builders, purpose: "construir servers MCP", status: candidato}
      - {name: sequential-thinking, kind: mcp, subsector: planning, install: "npx -y @modelcontextprotocol/server-sequential-thinking", transport: stdio, trust: vetted, purpose: "razonamiento por pasos (oficial, prove-it OK)", status: verificado}
      - {name: Time, kind: mcp, subsector: planning, source: "modelcontextprotocol/servers", purpose: "time/timezone reference server; útil para automatizaciones y fechas absolutas", tags: [ia-agentes, productividad], trust: research-2026, status: candidato}
      - {name: Grill-Me, kind: skill, subsector: planning, purpose: "stress-test socrático de planes", status: candidato}
      - {name: Create-Plan / Write-Plan, kind: skill, subsector: planning, purpose: "planificar antes de ejecutar", status: candidato}
      - {name: Skill-Creator, kind: skill, subsector: builders, purpose: "crear skills (meta)", status: candidato}
      - {name: Handoff / Yeet, kind: skill, subsector: planning, purpose: "comprimir sesión + commits/PRs", status: candidato}
      - {name: magg, kind: tool, subsector: orquestacion, purpose: "meta-MCP: descubre/instala/orquesta", status: candidato}
      - {name: 1mcp/agent, kind: tool, subsector: orquestacion, purpose: "agrega múltiples servers en uno", status: candidato}
      - {name: mcgravity, kind: tool, subsector: orquestacion, purpose: "proxy/load-balancer de servers", status: candidato}
      - {name: deliberation_council, kind: skill, subsector: planning, mode: served, source: "docs/skills/deliberation_council.md", purpose: "Cónclave: deliberación multi-voz + veredicto honesto (NUESTRO)", tags: [ia-agentes, productividad], status: instalado}
      - {name: deliberation_council_portable, kind: skill, subsector: planning, mode: served, source: "docs/skills/deliberation_council_portable.md", purpose: "Cónclave portable sin runtime Python (NUESTRO)", tags: [ia-agentes, productividad], status: instalado}
      - {name: StormMCP, kind: tool, subsector: orquestacion, purpose: "compone varios en endpoint unificado", status: candidato}

  infraestructura:
    label: Infraestructura
    desc: Ejecutar y mantener — ficheros, git, terminal y operación.
    aliases: [infra, devops, sistema, commodity, docker, kubernetes, k8s, cloud, aws, gcp, azure, server, deploy, deployment, monitoring, observability, network, storage, terraform, ci-cd, hosting, terminal, shell, filesystem, git, github]
    subsectors:
      ficheros: {label: Ficheros, aliases: [filesystem, archivos]}
      git: {label: Git, aliases: [github, control-versiones]}
      terminal: {label: Terminal, aliases: [shell, comandos]}
      operacion: {label: Operación, aliases: [ops, ledger, disciplina, sanitation]}
      escritorio: {label: Escritorio, aliases: [desktop, gui, computer-use, mouse, teclado]}
    entries:
      - {name: atlas-operating, kind: mcp, subsector: operacion, source: atlas.mcp.operating_server, purpose: "OPERATING LOOP + ledger + sanitation (NUESTRO): estado vivo, AGENTS.md y auditoría de higiene", install: "claude mcp add atlas-operating", status: instalado, best_for: [preflight, estado-vivo, ledger, sanitation], examples: ["leer WHERE actual", "verificar disciplina antes de cambiar"]}
      - {name: Filesystem, kind: mcp, subsector: ficheros, source: "modelcontextprotocol/servers", purpose: "acceso a ficheros", status: candidato}
      - {name: Git / GitHub, kind: mcp, subsector: git, purpose: "git + issues/PRs", status: candidato}
      - {name: Docker MCP, kind: mcp, subsector: operacion, source: "docker", purpose: "containers/images/local dev; alto impacto, candidato con allowlist estricta", tags: [infraestructura, programacion], trust: research-2026, status: candidato}
      - {name: Kubernetes MCP, kind: mcp, subsector: operacion, source: "kubernetes/cloud-native", purpose: "cluster inspection/ops; alto riesgo, solo lectura y contexto concreto antes de conectar", tags: [infraestructura], trust: research-2026, status: candidato}
      - {name: Cloudflare MCP, kind: mcp, subsector: operacion, source: "cloudflare", purpose: "edge, DNS, workers y observabilidad; vendor-maintained, requiere token scoped", tags: [infraestructura], trust: research-2026, status: candidato}
      - {name: Desktop Commander, kind: mcp, subsector: terminal, purpose: "archivos + terminal", status: candidato}
      - {name: computer-control-mcp, kind: mcp, subsector: escritorio, install: "env DISPLAY=:99 /home/ronin/proyectos/atlas-core/.venv-desktop/bin/computer-control-mcp", transport: stdio, trust: vetted, purpose: "GUI mouse/keyboard/OCR contra display VIRTUAL Xvfb :99 — nunca el real (prove-it OK 2026-07-02, 15 tools). Requiere Xvfb :99 corriendo.", tags: [programacion, infraestructura], status: verificado, read_only_tools: [take_screenshot, take_screenshot_with_ocr, get_screen_size, list_windows]}
      - {name: computer-control-mcp-real-display, kind: mcp, subsector: escritorio, install: "env DISPLAY=:0 /home/ronin/proyectos/atlas-core/.venv-desktop/bin/computer-control-mcp", transport: stdio, trust: vetted, purpose: "GUI mouse/keyboard/OCR contra el display REAL :0 (sesión de escritorio en vivo) — NUNCA verificar/probar sin un caso de uso concreto y confirmación explícita del usuario; deliberadamente NO promovida a verificado hasta que exista esa razón. Todas las tools quedan mutate/HITL (sin read_only_tools) por diseño: incluso una lectura aquí toca la sesión real.", tags: [programacion, infraestructura], status: candidato}
