items:
  - id: f2-1-multihop
    title: "Multi-hop recall en el sustrato de memoria"
    why: >
      El recall actual es plano: devuelve memorias individuales pero no encadena N memorias
      para responder a preguntas que requieren razonamiento entre ellas. Es el próximo hito
      Fase 2 según el ledger y es de tipo-1 (afecta la utilidad central del sustrato).
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `recall_multihop(query, hops=N)` devuelve una cadena verificable de hasta N memorias
      relacionadas; test de integración demuestra que la respuesta final no es alcanzable
      con un solo hop; Merkle chain sigue válida.
    priority: 1
    status: done  # 2026-06-22: SqliteMemoryIndex.recall_multihop + 11 tests (criterio central: C no alcanzable en 1 hop)

  - id: f2-2-pii-crypto-shredding
    title: "PII/crypto-shredding: olvido real del contenido"
    why: >
      Hoy `retire` elimina del índice pero el contenido persiste cifrado en disco. Para
      cumplir el EU AI Act (GAP-1 crítico) el olvido debe ser irrecuperable: destruir la
      clave → dato cifrado ilegible, sin romper la cadena Merkle. Es tipo-1/2 FUNDACIONAL.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `shred(memory_id)` destruye la clave de cifrado del ítem; tras shred, cualquier
      intento de recuperar el contenido devuelve error irrecuperable; el índice Merkle
      sigue siendo verificable (el slot aparece como 'shredded', no ausente); test de
      integración con un ítem PII sintético demuestra irrecuperabilidad.
    priority: 1
    status: done  # 2026-06-24: cifrado Fernet por-ítem + shred() + secure_delete=ON, 10 tests; targets corregidos
    # NOTA seguimiento: contenido ANTES de esto estaba en CLARO (no cifrado); ahora cifrado por-ítem.
    # Gaps menores diferidos: (1) rebuild_from inserta en claro sin clave (ruta legacy); (2) la clave
    # Fernet vive en la misma DB que el ciphertext — protege el OLVIDO (destruir clave→irrecuperable),
    # no la confidencialidad frente a quien tenga el fichero .db. Considerar keystore separado.

  - id: f2-3-honest-eval
    title: "Evaluación honesta: benchmark anti-trampa"
    why: >
      El diseño ya existe (hilo-B del design doc) pero no está construido. Sin un benchmark
      que mida honestamente la calidad del recall evitamos el riesgo de optimizar métricas
      que no reflejan la realidad (Goodhart). Es tipo-1.
    targets:
      - "src/atlas/memory/"
      - "tests/benchmarks/"
    acceptance: >
      Script `scripts/eval_memory_benchmark.py` ejecuta un conjunto fijo de N queries sobre
      un corpus sintético controlado, reporta precision/recall/F1 sin acceso al corpus
      durante la indexación (anti-leak), y produce un informe reproducible; CI no lo puede
      pasar sin datos reales.
    priority: 2
    status: pending

  - id: f2-4-memory-poisoning
    title: "Envenenamiento de memoria: write-gating genérico"
    why: >
      `LessonVerifier` existe en el tenant de seguridad pero el motor genérico no tiene
      write-gating. Un adversario puede inyectar memorias falsas por cualquier path no
      asegurado. Es tipo-1; el ledger lo marca como 'parcial'.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Todo `add_memory` pasa por un `WriteGate` configurable (por defecto: hash de
      procedencia requerido); test de integración demuestra que una memoria sin procedencia
      válida es rechazada; el tenant de seguridad puede inyectar un `LessonVerifier`
      como política.
    priority: 2
    status: done  # 2026-06-24: WriteGate Protocol + ProvenanceWriteGate (rechaza sin merkle_leaf_hash) +
    # AllowAll, inyectable en el constructor del índice (opt-in, default None=compat). Gate evaluado al
    # inicio de upsert antes de cualquier escritura. 16 tests (incl. política custom estilo verifier).
    # targets corregidos: el chokepoint real es SqliteMemoryIndex.upsert (memory_manager.py no existe).

  - id: f2-5-tenancy-isolation
    title: "Fuga entre usuarios/tenancy: namespacing del índice"
    why: >
      El índice SQLite actual no separa namespaces por tenant/usuario. En despliegues multi-
      usuario cualquier query puede filtrar memorias de otro usuario. Es tipo-1: defecto de
      seguridad fundamental antes de cualquier despliegue real.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Cada operación de índice acepta un `tenant_id`; queries de tenant A no devuelven
      resultados de tenant B bajo ninguna condición; test de integración con 2 tenants
      sintéticos y 10 memorias cada uno demuestra aislamiento completo; migración de índices
      existentes documentada.
    priority: 1
    status: done  # 2026-06-24: tenant ligado a la INSTANCIA (self._tenant, default 'default'); todas las
    # lecturas/escrituras filtran por tenant; rebuild_from acotado; upsert guard anti-fuga; 9 tests
    # (2 tenants x 10 memorias, mismo .db). Migración: columna tenant idempotente, filas previas → 'default'.
    # Decisión: tenant por-instancia (no param por-op, que se olvida y filtra). targets corregidos.

  - id: f2-6-personalization-vs-contamination
    title: "Personalización vs contaminación: política de límite"
    why: >
      El sustrato aprende patrones del usuario (personalización deseable) pero puede
      contaminar el conocimiento objetivo con sesgos individuales (contaminación indeseable).
      No existe política ni mecanismo de separación. Es tipo-3-ish según el ledger: afecta
      la fiabilidad del conocimiento a largo plazo. Marcado como 'muro' en el ledger.
    targets:
      - "src/atlas/memory/memory_manager.py"
      - "src/atlas/core/self_maintenance/analyst.py"
    acceptance: >
      `MemoryManager` distingue entre memorias 'personal' y 'factual' por metadato de
      procedencia; el recall por defecto no mezcla tipos sin flag explícito; existe política
      de expiración diferenciada (personal: TTL corto; factual: TTL largo o sin expiración);
      test demuestra que contaminación sintética no afecta recall factual.
    priority: 3
    status: pending

  # --- Reposición 2026-06-24: wire-before-claim. Las capacidades f2-1/f2-2/f2-5 existen en
  # SqliteMemoryIndex pero NINGÚN caller (MCP/trunk/manager) las usa todavía. Son gaps reales,
  # no trabajo inventado: sin esto el aislamiento de tenant no es efectivo en producción y
  # multihop/shred no son invocables por clientes.
  - id: f2-7-tenant-wiring
    title: "Propagar tenant_id desde el MCP/trunk hasta el índice"
    why: >
      f2-5 dio aislamiento por tenant en SqliteMemoryIndex, pero ningún caller pasa tenant:
      memory_server/memory_trunk construyen el índice sin `tenant`, así que TODO cae en
      'default' y el aislamiento no es efectivo en un despliegue multi-usuario. Es tipo-1:
      la corrección de seguridad de f2-5 no surte efecto hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      El servidor MCP de memoria deriva un `tenant_id` por sesión/cliente y construye/selecciona
      el índice con ese tenant; una petición del cliente A no recupera memorias del cliente B;
      test de integración con 2 clientes sintéticos demuestra aislamiento extremo-a-extremo.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunkRouter.for_tenant (cachea trunk tenant-scoped/mismo db) +
    # build_tenant_memory_server(router, tenant_resolver): cada tool deriva el tenant server-side
    # (no param del cliente, no falsificable). 6 tests incl. e2e FastMCP real (client-a no ve client-b).
    # NOTA: serve() stdio sigue single-tenant 'default' (1 cliente/proceso); un transporte compartido
    # (HTTP) debe pasar un resolver de sesión a build_tenant_memory_server. Capacidad cableada y probada.

  - id: f2-8-expose-multihop-shred
    title: "Exponer recall_multihop y shred por el MCP de memoria"
    why: >
      recall_multihop (f2-1) y shred (f2-2) existen en el índice pero no hay herramienta MCP
      que los invoque, así que un cliente no puede encadenar memorias ni ejercer el derecho al
      olvido. Wire-before-claim: la capacidad sin cablear es vapor.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      Hay tools MCP para recall multi-hop (con `hops`) y para shred(memory_id); un cliente
      puede invocarlas; tras shred vía MCP el contenido es irrecuperable; test de integración
      cubre ambas rutas.
    priority: 2
    status: done  # 2026-06-24: MemoryTrunk.recall_multihop + .shred; tools MCP en ambos builders
    # (single y multi-tenant). Arreglado bug latente: trunk.recall ahora salta shredded (text_of
    # lanzaba ShreddedContentError tras f2-2). 10 tests incl. e2e shred via call_tool y aislamiento.

  - id: f2-9-keystore-hardening
    title: "Crypto-shred: keystore separado + cifrar rebuild_from"
    why: >
      Gaps diferidos de f2-2: rebuild_from inserta contenido EN CLARO (ruta legacy) y la clave
      Fernet vive en la misma DB que el ciphertext (protege el olvido, no la confidencialidad
      frente a quien tenga el .db). Cerrar ambos para que el cifrado en reposo tenga sentido.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      rebuild_from cifra por-ítem igual que upsert (test: la columna text no es plaintext tras
      rebuild); el keystore de claves Fernet vive en un almacén separado de la DB principal
      (test: no hay claves en la DB de records); suite verde.
    priority: 2
    status: done  # 2026-06-24: keystore en fichero hermano <db>.keys (conexión propia, secure_delete=ON);
    # migración idempotente saca claves de records.content_keys → keystore; rebuild_from cifra por-ítem.
    # 10 tests; shred sigue irrecuperable. content_keys de la DB de records queda a 0 filas.

  # --- Reposición 2026-06-24 (2ª): más gaps reales wire-before-claim / hardening.
  - id: f2-11-writegate-wiring
    title: "Cablear el WriteGate (f2-4) al MCP/trunk para que el anti-envenenamiento aplique en prod"
    why: >
      f2-4 dio un WriteGate inyectable pero el MCP (MemoryTrunk/MemoryTrunkRouter/serve) lo construye con
      write_gate=None → el anti-envenenamiento NO está activo en producción (mismo patrón que f2-5→f2-7).
      Además MemoryTrunk.add llama upsert sin merkle_leaf_hash, así que activar ProvenanceWriteGate exige
      que add calcule/aporte una procedencia (hash del texto + origen) para no rechazar toda escritura legítima.
      Es tipo-1: la defensa existe pero no protege hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_trunk.py"
      - "src/atlas/mcp/memory_server.py"
    acceptance: >
      El trunk puede construirse con un WriteGate por defecto; MemoryTrunk.add genera una procedencia
      (p.ej. hash sha256 del texto+timestamp) y la pasa como merkle_leaf_hash a upsert para pasar el gate;
      test demuestra que con ProvenanceWriteGate activo un add legítimo entra y una escritura sin procedencia
      (path crudo) es rechazada; el default sigue sin gate para no romper compat.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunk.add genera procedencia sha256(text+created_at)→merkle_leaf_hash;
    # serve(require_provenance=True) + build_gated_index construyen el índice con ProvenanceWriteGate.
    # 7 tests: add legítima entra, upsert crudo sin procedencia rechazado, aislamiento por tenant intacto.
    # LIMITACIÓN: index.supersede no enruta procedencia → bajo gate, supersede falla (deuda anotada).

  - id: f2-10-keystore-orphan-gc
    title: "Keystore: recolectar claves huérfanas tras rebuild_from"
    why: >
      rebuild_from re-cifra por-ítem pero las claves de ids que desaparecen del índice quedan huérfanas en
      el keystore (sin record que las referencie). No es una fuga (no hay ciphertext asociado) pero ensucia
      el almacén y contradice el espíritu del olvido. Limpieza acotada.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      tras rebuild_from, el keystore no contiene claves de ids ausentes del índice (test: id viejo eliminado
      en rebuild → su clave ya no está en el keystore); shred y round-trip siguen intactos; suite verde.
    priority: 2
    status: pending

  - id: f2-12-supersede-provenance
    title: "supersede bajo WriteGate: enrutar procedencia"
    why: >
      f2-11 hizo que MemoryTrunk.add aporte procedencia, pero index.supersede llama internamente a
      upsert sin merkle_leaf_hash, así que bajo un ProvenanceWriteGate activo cualquier supersede es
      rechazado. La supersesión (reemplazo con lineage) es un write legítimo y debe pasar el gate.
    targets:
      - "src/atlas/memory/memory_index.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      index.supersede acepta/propaga una procedencia hasta su upsert interno; MemoryTrunk.supersede
      genera procedencia como add; test demuestra que con ProvenanceWriteGate activo un supersede
      legítimo entra (no es rechazado) y conserva el lineage; suite verde.
    priority: 2
    status: pending
