  - id: f2-7-tenant-wiring
    title: "Propagar tenant_id desde el MCP/trunk hasta el Ã­ndice"
    why: >
      f2-5 dio aislamiento por tenant en SqliteMemoryIndex, pero ningÃšn caller pasa tenant:
      memory_server/memory_trunk construyen el Ã­ndice sin `tenant`, asÃ­ que TODO cae en
      'default' y el aislamiento no es efectivo en un despliegue multi-usuario. Es tipo-1:
      la correcciÃģn de seguridad de f2-5 no surte efecto hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      El servidor MCP de memoria deriva un `tenant_id` por sesiÃģn/cliente y construye/selecciona
      el Ã­ndice con ese tenant; una peticiÃģn del cliente A no recupera memorias del cliente B;
      test de integraciÃģn con 2 clientes sintÃĐticos demuestra aislamiento extremo-a-extremo.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunkRouter.for_tenant (cachea trunk tenant-scoped/mismo db) +
    # build_tenant_memory_server(router, tenant_resolver): cada tool deriva el tenant server-side
    # (no param del cliente, no falsificable). 6 tests incl. e2e FastMCP real (client-a no ve client-b).
    # NOTA: serve() stdio sigue single-tenant 'default' (1 cliente/proceso); un transporte compartido
    # (HTTP) debe pasar un resolver de sesiÃģn a build_tenant_memory_server. Capacidad cableada y probada.

  - id: f2-8-expose-multihop-shred
    title: "Exponer recall_multihop y shred por el MCP de memoria"
    why: >
      recall_multihop (f2-1) y shred (f2-2) existen en el Ã­ndice pero no hay herramienta MCP
      que los invoque, asÃ­ que un cliente no puede encadenar memorias ni ejercer el derecho al
      olvido. Wire-before-claim: la capacidad sin cablear es vapor.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      Hay tools MCP para recall multi-hop (con `hops`) y para shred(memory_id); un cliente
      puede invocarlas; tras shred vÃ­a MCP el contenido es irrecuperable; test de integraciÃģn
      cubre ambas rutas.
    priority: 2
    status: done  # 2026-06-24: MemoryTrunk.recall_multihop + .shred; tools MCP en ambos builders
