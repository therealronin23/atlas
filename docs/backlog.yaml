  - id: t4-sentinel-tool-coherence
    title: "SentinelGate: coherencia descripciГіnвҶ”schema en tools adoptadas (capa 4 diferida, ADR-038)"
    why: >
      ADR-038 (docs/decisions/adr/adr_038_atlas_sentinel_gate.md) implementГі 3 de 4 capas de
      vetting de adopciГіn MCP (identidad+snapshot anti rug-pull, IOC/coherencia de comando,
      tiering read/write/shell_net/credential вҖ” las tres вң… en sentinel_gate.py) pero dejГі
      diferida la capa 4: "Вҝlo que el tool AFIRMA que hace (description) coincide con lo que
      PIDE (paths/endpoints/permisos de su inputSchema)?". Verificado contra cГіdigo real
      (sentinel_gate.py:28, comentario "Diferido... coherencia AST profunda (reusar
      ast_guard)"): la capa 4 NO existe (solo _vet_tool con IOC de superficie, no comparaciГіn
      semГЎntica descripciГіn-vs-schema). Es el hueco real que le falta al pipeline T4.2
      (candidataвҶ’diseccionadaвҶ’absorbida industrializado) para vetar candidatos MCP cuya
      descripciГіn miente sobre lo que su schema realmente permite вҖ” el vector exacto de
      "tool poisoning" que ADR-036 cataloga como amenaza #1.
      Nota de investigaciГіn: la propia anotaciГіn del cГіdigo dice "reusar ast_guard", pero
      `src/atlas/security/ast_guard.py` es un lint de AST de CГ“DIGO Python (imports/calls
      bloqueados en codegen), no un comparador descriptionвҶ”schema de tools MCP вҖ” decide-con-
      hechos antes de construir: puede que aplique como inspiraciГіn de patrГіn (AST sobre el
      JSON del schema) pero no como reuso directo. Investigar primero, documentar la decisiГіn,
      luego construir.
    targets:
      - "src/atlas/security/sentinel_gate.py"
    acceptance: >
      Nota de investigaciГіn corta (en el propio mГіdulo o en un comentario de diseГұo) que
      decide si ast_guard aplica adaptado o si hace falta lГіgica nueva, y por quГ©. Capa de
      coherencia (`_vet_tool` o mГ©todo nuevo) que detecte al menos un caso concreto de
      discrepancia: p.ej. una tool cuya `description` se declara "solo lectura" pero su
      `inputSchema` acepta parГЎmetros de comando/escritura/URL arbitraria fuera de lo que la
      descripciГіn sugiere вҶ’ clasificada como discrepancia bloqueante (o `review` si la
      seГұal es dГ©bil, coherente con el resto de SentinelGate que ya usa fail-closed para
      `credential`). Test con un fixture de tool "maliciosa" (description benigna +
      inputSchema peligroso) que demuestre el veto, y un fixture de tool coherente que NO
      se bloquee (evitar falsos positivos que rompan la adopciГіn normal); suite verde.
    priority: 3
    status: done  # 2026-07-23 (sesiГіn maratГіn): commit 6239a2d

