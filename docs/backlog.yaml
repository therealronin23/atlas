    title: "f2-6b paso 1: generador determinista de pares (lección, etiqueta) sintéticos"
    why: >
      Primer paso mecánico del despiece de f2-6b (el item abierto le quedó grande al constructor:
      diff vacío el 2026-07-10). Un script puro y determinista que genere N pares (texto de lección,
      etiqueta factual|personal) con seed fija, variedad léxica y proporción configurable — la
      verdad-fundamental sobre la que medirá el paso 2.
    targets:
      - "tests/benchmarks/"
    acceptance: >
      tests/benchmarks/gen_judge_pairs.py: función generate_pairs(n, seed) -> list[dict] con claves
      text/label, determinista (misma seed = mismos pares), y CLI que escribe JSON. Test que fija
      determinismo, formato y proporción de clases.
    priority: 3
    status: pending
    test_cmd: ["python3", "-m", "pytest", "tests/benchmarks/test_gen_judge_pairs.py", "-q"]

  - id: f2-6b-2-judge-vs-baseline-runner
    title: "f2-6b paso 2: runner juez-LLM vs baseline determinista sobre los pares del paso 1"
    why: >
      Segundo paso mecánico: evaluar un clasificador LLM (InferenceHub L1) contra un baseline
      determinista (regla por keywords) sobre los pares de f2-6b-1, emitiendo accuracy por clase
      en JSON. El hub se inyecta (tests con fake, cero red).
    targets:
      - "tests/benchmarks/"
    acceptance: >
      tests/benchmarks/judge_vs_baseline.py: evaluate(pairs, judge, baseline) -> dict con accuracy
      de ambos + por clase; CLI que lee el JSON del paso 1 y escribe resultados. Test con juez fake
      (respuestas fijadas) y baseline real.
    priority: 3
    status: pending
    test_cmd: ["python3", "-m", "pytest", "tests/benchmarks/test_judge_vs_baseline.py", "-q"]

  - id: f2-6b-3-verdict-report
    title: "f2-6b paso 3: informe con veredicto viable/no-costo-eficaz desde el JSON del paso 2"
    why: >
      Cierre del despiece: render de informe markdown a docs/inbox/ (entra como 'propuesto' vía
      triage) con el veredicto de la aceptación original de f2-6b: juez viable si mejora >10%
      sobre baseline; si no, 'no costo-eficaz'. Sin LLM: es un render determinista.
    targets:
      - "tests/benchmarks/"
    acceptance: >
      tests/benchmarks/judge_verdict_report.py: render(results) -> str markdown con veredicto según
      el umbral, y CLI que escribe a docs/inbox/. Test del render con resultados sintéticos en
      ambos lados del umbral.
    priority: 3
    status: pending
    test_cmd: ["python3", "-m", "pytest", "tests/benchmarks/test_judge_verdict_report.py", "-q"]

  # --- Absorción Graphiti (disección 2026-07-10, docs/inbox/graphiti_dissection_2026-07-10.md) ---

  - id: mem-1-fact-time-vs-system-time
    title: "Separar tiempo-del-hecho de tiempo-de-sistema en el índice de memoria"
    why: >
      Graphiti (Zep) distingue valid_at/invalid_at (cuándo el hecho fue/dejó de ser cierto EN EL
      MUNDO) de expired_at (cuándo el SISTEMA lo invalidó). Nuestro valid_from_ns/valid_until_ns en
      SqliteMemoryIndex es solo tiempo de sistema — perdemos la fecha real del hecho cuando una
      memoria describe algo pasado ingerido tarde. Disección con evidencia:
      docs/inbox/graphiti_dissection_2026-07-10.md#1 (patrón coste S).
    targets:
      - "src/atlas/memory/record.py"
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      MemoryRecord acepta fact_valid_at_ns/fact_invalid_at_ns opcionales (default None = sin cambios);
      migración idempotente de columnas (patrón _migrate_temporal); recall_temporal razona
      opcionalmente sobre fact_valid_at_ns; test as_of anclado al tiempo del hecho, no al de ingesta.
    priority: 3
    status: pending
    test_cmd: ["python3", "-m", "pytest", "tests/test_memory_index.py", "-x", "-q"]
