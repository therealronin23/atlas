items:
  - id: f2-1-multihop
    title: "Multi-hop recall en el sustrato de memoria"
    why: >
      El recall actual es plano: devuelve memorias individuales pero no encadena N memorias
      para responder a preguntas que requieren razonamiento entre ellas. Es el prÃģximo hito
      Fase 2 segÃšn el ledger y es de tipo-1 (afecta la utilidad central del sustrato).
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `recall_multihop(query, hops=N)` devuelve una cadena verificable de hasta N memorias
      relacionadas; test de integraciÃģn demuestra que la respuesta final no es alcanzable
      con un solo hop; Merkle chain sigue vÃĄlida.
    priority: 1
    status: done  # 2026-06-22: SqliteMemoryIndex.recall_multihop + 11 tests (criterio central: C no alcanzable en 1 hop)

  - id: f2-2-pii-crypto-shredding
    title: "PII/crypto-shredding: olvido real del contenido"
    why: >
      Hoy `retire` elimina del Ã­ndice pero el contenido persiste cifrado en disco. Para
      cumplir el EU AI Act (GAP-1 crÃ­tico) el olvido debe ser irrecuperable: destruir la
      clave â dato cifrado ilegible, sin romper la cadena Merkle. Es tipo-1/2 FUNDACIONAL.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `shred(memory_id)` destruye la clave de cifrado del Ã­tem; tras shred, cualquier
      intento de recuperar el contenido devuelve error irrecuperable; el Ã­ndice Merkle
      sigue siendo verificable (el slot aparece como 'shredded', no ausente); test de
      integraciÃģn con un Ã­tem PII sintÃĐtico demuestra irrecuperabilidad.
    priority: 1
    status: done  # 2026-06-24: cifrado Fernet por-Ã­tem + shred() + secure_delete=ON, 10 tests; targets corregidos
    # NOTA seguimiento: contenido ANTES de esto estaba en CLARO (no cifrado); ahora cifrado por-Ã­tem.
    # Gaps menores diferidos: (1) rebuild_from inserta en claro sin clave (ruta legacy); (2) la clave
    # Fernet vive en la misma DB que el ciphertext â protege el OLVIDO (destruir claveâirrecuperable),
    # no la confidencialidad frente a quien tenga el fichero .db. Considerar keystore separado.

  - id: f2-3-honest-eval
    title: "EvaluaciÃģn honesta: benchmark anti-trampa"
    why: >
      El diseÃąo ya existe (hilo-B del design doc) pero no estÃĄ construido. Sin un benchmark
      que mida honestamente la calidad del recall evitamos el riesgo de optimizar mÃĐtricas
      que no reflejan la realidad (Goodhart). Es tipo-1.
    targets:
      - "src/atlas/memory/"
      - "tests/benchmarks/"
    acceptance: >
      Script `scripts/eval_memory_benchmark.py` ejecuta un conjunto fijo de N queries sobre
      un corpus sintÃĐtico controlado, reporta precision/recall/F1 sin acceso al corpus
      durante la indexaciÃģn (anti-leak), y produce un informe reproducible; CI no lo puede
      pasar sin datos reales.
    priority: 2
    status: done  # 2026-06-24 (autobuild): scripts/eval_memory_benchmark.py + tests/benchmarks/ (10 tests).
    # Anti-leak real (FASE 1 indexa sin ver queries / FASE 2 consulta), determinista (StubEmbedder con
    # corpus+queries fijos, test_reproducibility con 2 DBs). Honesto: StubEmbedder da mÃĐtricas reales bajas.

  - id: f2-4-memory-poisoning
    title: "Envenenamiento de memoria: write-gating genÃĐrico"
    why: >
      `LessonVerifier` existe en el tenant de seguridad pero el motor genÃĐrico no tiene
      write-gating. Un adversario puede inyectar memorias falsas por cualquier path no
      asegurado. Es tipo-1; el ledger lo marca como 'parcial'.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Todo `add_memory` pasa por un `WriteGate` configurable (por defecto: hash de
      procedencia requerido); test de integraciÃģn demuestra que una memoria sin procedencia
      vÃĄlida es rechazada; el tenant de seguridad puede inyectar un `LessonVerifier`
      como polÃ­tica.
    priority: 2
    status: done  # 2026-06-24: WriteGate Protocol + ProvenanceWriteGate (rechaza sin merkle_leaf_hash) +
    # AllowAll, inyectable en el constructor del Ã­ndice (opt-in, default None=compat). Gate evaluado al
    # inicio de upsert antes de cualquier escritura. 16 tests (incl. polÃ­tica custom estilo verifier).
    # targets corregidos: el chokepoint real es SqliteMemoryIndex.upsert (memory_manager.py no existe).

  - id: f2-5-tenancy-isolation
    title: "Fuga entre usuarios/tenancy: namespacing del Ã­ndice"
    why: >
      El Ã­ndice SQLite actual no separa namespaces por tenant/usuario. En despliegues multi-
      usuario cualquier query puede filtrar memorias de otro usuario. Es tipo-1: defecto de
      seguridad fundamental antes de cualquier despliegue real.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Cada operaciÃģn de Ã­ndice acepta un `tenant_id`; queries de tenant A no devuelven
      resultados de tenant B bajo ninguna condiciÃģn; test de integraciÃģn con 2 tenants
      sintÃĐticos y 10 memorias cada uno demuestra aislamiento completo; migraciÃģn de Ã­ndices
      existentes documentada.
    priority: 1
    status: done  # 2026-06-24: tenant ligado a la INSTANCIA (self._tenant, default 'default'); todas las
    # lecturas/escrituras filtran por tenant; rebuild_from acotado; upsert guard anti-fuga; 9 tests
    # (2 tenants x 10 memorias, mismo .db). MigraciÃģn: columna tenant idempotente, filas previas â 'default'.
    # DecisiÃģn: tenant por-instancia (no param por-op, que se olvida y filtra). targets corregidos.

  - id: f2-6-personalization-vs-contamination
    title: "PersonalizaciÃģn vs contaminaciÃģn: polÃ­tica de lÃ­mite"
    why: >
      El sustrato aprende patrones del usuario (personalizaciÃģn deseable) pero puede
      contaminar el conocimiento objetivo con sesgos individuales (contaminaciÃģn indeseable).
      No existe polÃ­tica ni mecanismo de separaciÃģn. Es tipo-3-ish segÃšn el ledger: afecta
      la fiabilidad del conocimiento a largo plazo. Marcado como 'muro' en el ledger.
    targets:
      - "src/atlas/memory/memory_manager.py"
      - "src/atlas/core/self_maintenance/analyst.py"
    acceptance: >
      `MemoryManager` distingue entre memorias 'personal' y 'factual' por metadato de
      procedencia; el recall por defecto no mezcla tipos sin flag explÃ­cito; existe polÃ­tica
      de expiraciÃģn diferenciada (personal: TTL corto; factual: TTL largo o sin expiraciÃģn);
      test demuestra que contaminaciÃģn sintÃĐtica no afecta recall factual.
    priority: 3
    status: done  # 2026-06-25: mitad tratable hecha (memory_class explÃ­cito + recall no-mezcla (default factual) + recall_split + TTL por-Ã­tem con default por clase + expire_stale, 13 tests). Muro registrado: clasificador automÃĄtico NO construido (1c).

  # --- ReposiciÃģn 2026-06-24: wire-before-claim. Las capacidades f2-1/f2-2/f2-5 existen en
