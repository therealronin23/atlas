      frente a quien tenga el .db). Cerrar ambos para que el cifrado en reposo tenga sentido.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      rebuild_from cifra por-Ã­tem igual que upsert (test: la columna text no es plaintext tras
      rebuild); el keystore de claves Fernet vive en un almacÃĐn separado de la DB principal
      (test: no hay claves en la DB de records); suite verde.
    priority: 2
    status: done  # 2026-06-24: keystore en fichero hermano <db>.keys (conexiÃģn propia, secure_delete=ON);
    # migraciÃģn idempotente saca claves de records.content_keys â keystore; rebuild_from cifra por-Ã­tem.
    # 10 tests; shred sigue irrecuperable. content_keys de la DB de records queda a 0 filas.

  # --- ReposiciÃģn 2026-06-24 (2ÂŠ): mÃĄs gaps reales wire-before-claim / hardening.
  - id: f2-11-writegate-wiring
    title: "Cablear el WriteGate (f2-4) al MCP/trunk para que el anti-envenenamiento aplique en prod"
    why: >
      f2-4 dio un WriteGate inyectable pero el MCP (MemoryTrunk/MemoryTrunkRouter/serve) lo construye con
      write_gate=None â el anti-envenenamiento NO estÃĄ activo en producciÃģn (mismo patrÃģn que f2-5âf2-7).
      AdemÃĄs MemoryTrunk.add llama upsert sin merkle_leaf_hash, asÃ­ que activar ProvenanceWriteGate exige
      que add calcule/aporte una procedencia (hash del texto + origen) para no rechazar toda escritura legÃ­tima.
      Es tipo-1: la defensa existe pero no protege hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_trunk.py"
      - "src/atlas/mcp/memory_server.py"
    acceptance: >
      El trunk puede construirse con un WriteGate por defecto; MemoryTrunk.add genera una procedencia
      (p.ej. hash sha256 del texto+timestamp) y la pasa como merkle_leaf_hash a upsert para pasar el gate;
      test demuestra que con ProvenanceWriteGate activo un add legÃ­timo entra y una escritura sin procedencia
      (path crudo) es rechazada; el default sigue sin gate para no romper compat.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunk.add genera procedencia sha256(text+created_at)âmerkle_leaf_hash;
    # serve(require_provenance=True) + build_gated_index construyen el Ã­ndice con ProvenanceWriteGate.
    # 7 tests: add legÃ­tima entra, upsert crudo sin procedencia rechazado, aislamiento por tenant intacto.
    # LIMITACIÃN: index.supersede no enruta procedencia â bajo gate, supersede falla (deuda anotada).

  - id: f2-10-keystore-orphan-gc
    title: "Keystore: recolectar claves huÃĐrfanas tras rebuild_from"
    why: >
      rebuild_from re-cifra por-Ã­tem pero las claves de ids que desaparecen del Ã­ndice quedan huÃĐrfanas en
      el keystore (sin record que las referencie). No es una fuga (no hay ciphertext asociado) pero ensucia
      el almacÃĐn y contradice el espÃ­ritu del olvido. Limpieza acotada.
