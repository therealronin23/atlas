      migraciГіn idempotente de columnas (patrГіn _migrate_temporal); recall_temporal razona
      opcionalmente sobre fact_valid_at_ns; test as_of anclado al tiempo del hecho, no al de ingesta.
    priority: 3
    status: pending
    test_cmd: ["python3", "-m", "pytest", "tests/test_memory_index.py", "-x", "-q"]

