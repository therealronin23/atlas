      entradas "t3-*" antes de esta reposición).
    targets:
      - "src/atlas/core/orchestrator_parts/gate_f_executor.py"
      - "src/atlas/core/orchestrator_parts/gate_f_parser.py"
      - "src/atlas/tools/computer_use/"
    acceptance: >
