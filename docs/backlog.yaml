items:
  - id: f2-1-multihop
    title: "Multi-hop recall en el sustrato de memoria"
    why: >
      El recall actual es plano: devuelve memorias individuales pero no encadena N memorias
      para responder a preguntas que requieren razonamiento entre ellas. Es el prГіximo hito
      Fase 2 segГәn el ledger y es de tipo-1 (afecta la utilidad central del sustrato).
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `recall_multihop(query, hops=N)` devuelve una cadena verificable de hasta N memorias
      relacionadas; test de integraciГіn demuestra que la respuesta final no es alcanzable
      con un solo hop; Merkle chain sigue vГЎlida.
    priority: 1
    status: done  # 2026-06-22: SqliteMemoryIndex.recall_multihop + 11 tests (criterio central: C no alcanzable en 1 hop)

  - id: f2-2-pii-crypto-shredding
    title: "PII/crypto-shredding: olvido real del contenido"
    why: >
      Hoy `retire` elimina del Гӯndice pero el contenido persiste cifrado en disco. Para
      cumplir el EU AI Act (GAP-1 crГӯtico) el olvido debe ser irrecuperable: destruir la
      clave вҶ’ dato cifrado ilegible, sin romper la cadena Merkle. Es tipo-1/2 FUNDACIONAL.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      `shred(memory_id)` destruye la clave de cifrado del Гӯtem; tras shred, cualquier
      intento de recuperar el contenido devuelve error irrecuperable; el Гӯndice Merkle
      sigue siendo verificable (el slot aparece como 'shredded', no ausente); test de
      integraciГіn con un Гӯtem PII sintГ©tico demuestra irrecuperabilidad.
    priority: 1
    status: done  # 2026-06-24: cifrado Fernet por-Гӯtem + shred() + secure_delete=ON, 10 tests; targets corregidos
    # NOTA seguimiento: contenido ANTES de esto estaba en CLARO (no cifrado); ahora cifrado por-Гӯtem.
    # Gaps menores diferidos: (1) rebuild_from inserta en claro sin clave (ruta legacy); (2) la clave
    # Fernet vive en la misma DB que el ciphertext вҖ” protege el OLVIDO (destruir claveвҶ’irrecuperable),
    # no la confidencialidad frente a quien tenga el fichero .db. Considerar keystore separado.

  - id: f2-3-honest-eval
    title: "EvaluaciГіn honesta: benchmark anti-trampa"
    why: >
      El diseГұo ya existe (hilo-B del design doc) pero no estГЎ construido. Sin un benchmark
      que mida honestamente la calidad del recall evitamos el riesgo de optimizar mГ©tricas
      que no reflejan la realidad (Goodhart). Es tipo-1.
    targets:
      - "src/atlas/memory/"
      - "tests/benchmarks/"
    acceptance: >
      Script `scripts/eval_memory_benchmark.py` ejecuta un conjunto fijo de N queries sobre
      un corpus sintГ©tico controlado, reporta precision/recall/F1 sin acceso al corpus
      durante la indexaciГіn (anti-leak), y produce un informe reproducible; CI no lo puede
      pasar sin datos reales.
    priority: 2
    status: done  # 2026-06-24 (autobuild): scripts/eval_memory_benchmark.py + tests/benchmarks/ (10 tests).
    # Anti-leak real (FASE 1 indexa sin ver queries / FASE 2 consulta), determinista (StubEmbedder con
    # corpus+queries fijos, test_reproducibility con 2 DBs). Honesto: StubEmbedder da mГ©tricas reales bajas.

  - id: f2-4-memory-poisoning
    title: "Envenenamiento de memoria: write-gating genГ©rico"
    why: >
      `LessonVerifier` existe en el tenant de seguridad pero el motor genГ©rico no tiene
      write-gating. Un adversario puede inyectar memorias falsas por cualquier path no
      asegurado. Es tipo-1; el ledger lo marca como 'parcial'.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Todo `add_memory` pasa por un `WriteGate` configurable (por defecto: hash de
      procedencia requerido); test de integraciГіn demuestra que una memoria sin procedencia
      vГЎlida es rechazada; el tenant de seguridad puede inyectar un `LessonVerifier`
      como polГӯtica.
    priority: 2
    status: done  # 2026-06-24: WriteGate Protocol + ProvenanceWriteGate (rechaza sin merkle_leaf_hash) +
    # AllowAll, inyectable en el constructor del Гӯndice (opt-in, default None=compat). Gate evaluado al
    # inicio de upsert antes de cualquier escritura. 16 tests (incl. polГӯtica custom estilo verifier).
    # targets corregidos: el chokepoint real es SqliteMemoryIndex.upsert (memory_manager.py no existe).

  - id: f2-5-tenancy-isolation
    title: "Fuga entre usuarios/tenancy: namespacing del Гӯndice"
    why: >
      El Гӯndice SQLite actual no separa namespaces por tenant/usuario. En despliegues multi-
      usuario cualquier query puede filtrar memorias de otro usuario. Es tipo-1: defecto de
      seguridad fundamental antes de cualquier despliegue real.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      Cada operaciГіn de Гӯndice acepta un `tenant_id`; queries de tenant A no devuelven
      resultados de tenant B bajo ninguna condiciГіn; test de integraciГіn con 2 tenants
      sintГ©ticos y 10 memorias cada uno demuestra aislamiento completo; migraciГіn de Гӯndices
      existentes documentada.
    priority: 1
    status: done  # 2026-06-24: tenant ligado a la INSTANCIA (self._tenant, default 'default'); todas las
    # lecturas/escrituras filtran por tenant; rebuild_from acotado; upsert guard anti-fuga; 9 tests
    # (2 tenants x 10 memorias, mismo .db). MigraciГіn: columna tenant idempotente, filas previas вҶ’ 'default'.
    # DecisiГіn: tenant por-instancia (no param por-op, que se olvida y filtra). targets corregidos.

  - id: f2-6-personalization-vs-contamination
    title: "PersonalizaciГіn vs contaminaciГіn: polГӯtica de lГӯmite"
    why: >
      El sustrato aprende patrones del usuario (personalizaciГіn deseable) pero puede
      contaminar el conocimiento objetivo con sesgos individuales (contaminaciГіn indeseable).
      No existe polГӯtica ni mecanismo de separaciГіn. Es tipo-3-ish segГәn el ledger: afecta
      la fiabilidad del conocimiento a largo plazo. Marcado como 'muro' en el ledger.
    targets:
      - "src/atlas/memory/memory_manager.py"
      - "src/atlas/core/self_maintenance/analyst.py"
    acceptance: >
      `MemoryManager` distingue entre memorias 'personal' y 'factual' por metadato de
      procedencia; el recall por defecto no mezcla tipos sin flag explГӯcito; existe polГӯtica
      de expiraciГіn diferenciada (personal: TTL corto; factual: TTL largo o sin expiraciГіn);
      test demuestra que contaminaciГіn sintГ©tica no afecta recall factual.
    priority: 3
    status: done  # 2026-06-25: mitad tratable hecha (memory_class explГӯcito + recall no-mezcla (default factual) + recall_split + TTL por-Гӯtem con default por clase + expire_stale, 13 tests). Muro registrado: clasificador automГЎtico NO construido (1c).

  # --- ReposiciГіn 2026-06-24: wire-before-claim. Las capacidades f2-1/f2-2/f2-5 existen en
  # SqliteMemoryIndex pero NINGГҡN caller (MCP/trunk/manager) las usa todavГӯa. Son gaps reales,
  # no trabajo inventado: sin esto el aislamiento de tenant no es efectivo en producciГіn y
  # multihop/shred no son invocables por clientes.
  - id: f2-7-tenant-wiring
    title: "Propagar tenant_id desde el MCP/trunk hasta el Гӯndice"
    why: >
      f2-5 dio aislamiento por tenant en SqliteMemoryIndex, pero ningГәn caller pasa tenant:
      memory_server/memory_trunk construyen el Гӯndice sin `tenant`, asГӯ que TODO cae en
      'default' y el aislamiento no es efectivo en un despliegue multi-usuario. Es tipo-1:
      la correcciГіn de seguridad de f2-5 no surte efecto hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      El servidor MCP de memoria deriva un `tenant_id` por sesiГіn/cliente y construye/selecciona
      el Гӯndice con ese tenant; una peticiГіn del cliente A no recupera memorias del cliente B;
      test de integraciГіn con 2 clientes sintГ©ticos demuestra aislamiento extremo-a-extremo.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunkRouter.for_tenant (cachea trunk tenant-scoped/mismo db) +
    # build_tenant_memory_server(router, tenant_resolver): cada tool deriva el tenant server-side
    # (no param del cliente, no falsificable). 6 tests incl. e2e FastMCP real (client-a no ve client-b).
    # NOTA: serve() stdio sigue single-tenant 'default' (1 cliente/proceso); un transporte compartido
    # (HTTP) debe pasar un resolver de sesiГіn a build_tenant_memory_server. Capacidad cableada y probada.

  - id: f2-8-expose-multihop-shred
    title: "Exponer recall_multihop y shred por el MCP de memoria"
    why: >
      recall_multihop (f2-1) y shred (f2-2) existen en el Гӯndice pero no hay herramienta MCP
      que los invoque, asГӯ que un cliente no puede encadenar memorias ni ejercer el derecho al
      olvido. Wire-before-claim: la capacidad sin cablear es vapor.
    targets:
      - "src/atlas/mcp/memory_server.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      Hay tools MCP para recall multi-hop (con `hops`) y para shred(memory_id); un cliente
      puede invocarlas; tras shred vГӯa MCP el contenido es irrecuperable; test de integraciГіn
      cubre ambas rutas.
    priority: 2
    status: done  # 2026-06-24: MemoryTrunk.recall_multihop + .shred; tools MCP en ambos builders
    # (single y multi-tenant). Arreglado bug latente: trunk.recall ahora salta shredded (text_of
    # lanzaba ShreddedContentError tras f2-2). 10 tests incl. e2e shred via call_tool y aislamiento.

  - id: f2-9-keystore-hardening
    title: "Crypto-shred: keystore separado + cifrar rebuild_from"
    why: >
      Gaps diferidos de f2-2: rebuild_from inserta contenido EN CLARO (ruta legacy) y la clave
      Fernet vive en la misma DB que el ciphertext (protege el olvido, no la confidencialidad
      frente a quien tenga el .db). Cerrar ambos para que el cifrado en reposo tenga sentido.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      rebuild_from cifra por-Гӯtem igual que upsert (test: la columna text no es plaintext tras
      rebuild); el keystore de claves Fernet vive en un almacГ©n separado de la DB principal
      (test: no hay claves en la DB de records); suite verde.
    priority: 2
    status: done  # 2026-06-24: keystore en fichero hermano <db>.keys (conexiГіn propia, secure_delete=ON);
    # migraciГіn idempotente saca claves de records.content_keys вҶ’ keystore; rebuild_from cifra por-Гӯtem.
    # 10 tests; shred sigue irrecuperable. content_keys de la DB de records queda a 0 filas.

  # --- ReposiciГіn 2026-06-24 (2ВӘ): mГЎs gaps reales wire-before-claim / hardening.
  - id: f2-11-writegate-wiring
    title: "Cablear el WriteGate (f2-4) al MCP/trunk para que el anti-envenenamiento aplique en prod"
    why: >
      f2-4 dio un WriteGate inyectable pero el MCP (MemoryTrunk/MemoryTrunkRouter/serve) lo construye con
      write_gate=None вҶ’ el anti-envenenamiento NO estГЎ activo en producciГіn (mismo patrГіn que f2-5вҶ’f2-7).
      AdemГЎs MemoryTrunk.add llama upsert sin merkle_leaf_hash, asГӯ que activar ProvenanceWriteGate exige
      que add calcule/aporte una procedencia (hash del texto + origen) para no rechazar toda escritura legГӯtima.
      Es tipo-1: la defensa existe pero no protege hasta cablearla.
    targets:
      - "src/atlas/mcp/memory_trunk.py"
      - "src/atlas/mcp/memory_server.py"
    acceptance: >
      El trunk puede construirse con un WriteGate por defecto; MemoryTrunk.add genera una procedencia
      (p.ej. hash sha256 del texto+timestamp) y la pasa como merkle_leaf_hash a upsert para pasar el gate;
      test demuestra que con ProvenanceWriteGate activo un add legГӯtimo entra y una escritura sin procedencia
      (path crudo) es rechazada; el default sigue sin gate para no romper compat.
    priority: 1
    status: done  # 2026-06-24: MemoryTrunk.add genera procedencia sha256(text+created_at)вҶ’merkle_leaf_hash;
    # serve(require_provenance=True) + build_gated_index construyen el Гӯndice con ProvenanceWriteGate.
    # 7 tests: add legГӯtima entra, upsert crudo sin procedencia rechazado, aislamiento por tenant intacto.
    # LIMITACIГ“N: index.supersede no enruta procedencia вҶ’ bajo gate, supersede falla (deuda anotada).

  - id: f2-10-keystore-orphan-gc
    title: "Keystore: recolectar claves huГ©rfanas tras rebuild_from"
    why: >
      rebuild_from re-cifra por-Гӯtem pero las claves de ids que desaparecen del Гӯndice quedan huГ©rfanas en
      el keystore (sin record que las referencie). No es una fuga (no hay ciphertext asociado) pero ensucia
      el almacГ©n y contradice el espГӯritu del olvido. Limpieza acotada.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      tras rebuild_from, el keystore no contiene claves de ids ausentes del Гӯndice (test: id viejo eliminado
      en rebuild вҶ’ su clave ya no estГЎ en el keystore); shred y round-trip siguen intactos; suite verde.
    priority: 2
    status: done  # 2026-06-24 (autobuild): rebuild_from recoge old_ids antes del DELETE, reinserta, y tras
    # commit corre GC (orphan = old_ids - new_ids) borrando sus claves del keystore. 4 tests.
    # NOTA: solo limpia ids ausentes de ESTE rebuild; un barrido total keystore-vs-records queda como follow-up.

  - id: f2-12-supersede-provenance
    title: "supersede bajo WriteGate: enrutar procedencia"
    why: >
      f2-11 hizo que MemoryTrunk.add aporte procedencia, pero index.supersede llama internamente a
      upsert sin merkle_leaf_hash, asГӯ que bajo un ProvenanceWriteGate activo cualquier supersede es
      rechazado. La supersesiГіn (reemplazo con lineage) es un write legГӯtimo y debe pasar el gate.
    targets:
      - "src/atlas/memory/memory_index.py"
      - "src/atlas/mcp/memory_trunk.py"
    acceptance: >
      index.supersede acepta/propaga una procedencia hasta su upsert interno; MemoryTrunk.supersede
      genera procedencia como add; test demuestra que con ProvenanceWriteGate activo un supersede
      legГӯtimo entra (no es rechazado) y conserva el lineage; suite verde.
    priority: 2
    status: done  # 2026-06-24 (autobuild): SqliteMemoryIndex.supersede acepta merkle_leaf_hash keyword-only
    # opcional y lo propaga al upsert interno; MemoryTrunk.supersede genera procedencia sha256(text+created_at)
    # como add. 5 tests (rechazo sin proc bajo gate, aceptaciГіn con proc, lineage preservado). Retrocompat:
    # lesson_index.supersede no se rompe (param keyword-only con default).

  # --- ReposiciГіn 2026-06-24 (3ВӘ): gaps reales tras cerrar f2-3/f2-10/f2-12 (runway guard вүҘ3).
  # Documentados, no inventados: follow-up de f2-10 + deuda tГ©cnica del WORK_LEDGER (lГӯnea "Backlog tГ©cnico").
  - id: f2-13-keystore-full-sweep
    title: "Keystore: barrido total keystore-vs-records (huГ©rfanas de rebuilds previos)"
    why: >
      f2-10 limpia las claves de ids que desaparecen en ESE rebuild, pero claves huГ©rfanas de rebuilds
      anteriores (o de procesos interrumpidos) quedan en el keystore sin record que las referencie. No es
      fuga (sin ciphertext asociado) pero ensucia el almacГ©n y contradice el espГӯritu del olvido.
    targets:
      - "src/atlas/memory/memory_index.py"
    acceptance: >
      MГ©todo `gc_keystore()` (o equivalente) que borra del keystore toda clave cuyo id no exista en records;
      idempotente; test: sembrar una clave huГ©rfana directa en el keystore + un id vivo, correr gc вҶ’ la
      huГ©rfana desaparece y la viva permanece; shred y round-trip intactos; suite verde.
    priority: 2
    status: done  # 2026-06-24 autobuild: gc_keystore() borra claves sin record (huerfanas de cualquier origen), idempotente, reutiliza _del_key. 6 tests.

  - id: tech-1-cosine-dedup
    title: "Consolidar la implementaciГіn duplicada de similitud coseno"
    why: >
      El WORK_LEDGER (Backlog tГ©cnico) anota coseno duplicado en varios mГіdulos. DuplicaciГіn = riesgo de
      divergencia sutil (un sitio normaliza, otro no). Consolidar en una sola util compartida.
    targets:
      - "src/atlas/memory/"
      - "src/atlas/core/"
    acceptance: >
      Localizar las implementaciones de coseno duplicadas (grep), extraer UNA util compartida con tests,
      y reemplazar los call-sites; comportamiento idГ©ntico (tests existentes verdes); sin nueva dep.
    priority: 3
    status: done  # 2026-06-24 autobuild: lesson_recaller._cosine_similarity delega el coseno crudo a vector_store.cosine_similarity (canonica) preservando mapeo [0,1]+zero-norm. 5 tests, sin import circular.

  - id: tech-2-operational-wal-tests
    title: "Tests de operational_wal y AgenticExecutor (cobertura de la deuda)"
    why: >
      El WORK_LEDGER marca operational_wal / AgenticExecutor sin cobertura de tests dedicada. CГіdigo de
      ruta crГӯtica (WAL operacional, loop agГ©ntico) sin red de seguridad es deuda tipo-1.
    targets:
      - "src/atlas/core/"
    acceptance: >
      Tests de unidad/integraciГіn para los caminos principales de operational_wal (append/replay/truncado)
      y AgenticExecutor (suspend/resume HITL, dispatch de mutaciГіn); cubren el caso real, no triviales;
      suite verde.
    priority: 3
    status: done  # 2026-06-24 autobuild: tests gaps de operational_wal (concurrencia/tipos/rotacion) y AgenticExecutor (suspend/resume HITL/dispatch). 29 tests. BUG hallado -> tech-3.

  # --- ReposiciГіn 2026-06-24 (4ВӘ): runway guard вүҘ3. Gaps reales hallados en la corrida.
  - id: tech-3-wal-rotation-collision
    title: "OperationalWAL: colisiГіn de sufijo de rotaciГіn en el mismo segundo (data loss)"
    why: >
      Hallado por los tests de tech-2: `OperationalWAL._rotate_if_needed` usa strftime('%Y%m%d%H%M%S')
      como sufijo del archivo rotado. Si dos rotaciones ocurren en el mismo segundo, la segunda
      SOBRESCRIBE la primera silenciosamente вҶ’ pГ©rdida de datos del WAL. Bug real preexistente.
    targets:
      - "src/atlas/core/operational_wal.py"
    acceptance: >
      El sufijo de rotaciГіn es Гәnico aunque dos rotaciones caigan en el mismo segundo (p.ej. aГұadir
      contador/nanos/uuid corto); test que fuerza 2 rotaciones en el mismo segundo demuestra que NINGГҡN
      archivo rotado se sobrescribe (ambos conjuntos de registros recuperables); suite verde.
    priority: 2
    status: done  # 2026-06-25 autobuild: sufijo de colisiГіn incremental (-1,-2) cuando el path rotado existe; bajo self._lock (sin TOCTOU). Test fuerza 2 rotaciones/mismo segundo. mypy OK.

  - id: tech-4-property-verifier-wiring
    title: "PropertyVerifier: cablear a un consumidor o cuarentena (wire-before-claim)"
    why: >
      `src/atlas/core/decider/property_verifier.py` existe (PropertyVerifier, ADR-040 ext) pero NINGГҡN
      caller lo usa y no tiene tests. Es capacidad sin cablear = vapor. O se cablea al Decider (antes de
      emitir Allow para acciГіn reversible verifica el patch) con tests, o se manda a cuarentena/graveyard.
    targets:
      - "src/atlas/core/decider/property_verifier.py"
    acceptance: >
      DecisiГіn registrada: (a) cableado a un consumidor real (Decider) con test de integraciГіn que
      demuestra que un patch que viola una propiedad es rechazado; o (b) movido a _graveyard con WHY.md.
      No queda como mГіdulo huГ©rfano sin tests en src/.
    priority: 3
    status: done  # 2026-06-25: investigado (decide-with-facts) -> NO hay flujo consumidor (ColdUpdate usa patches diff no source; autonomous_decider recibe forensics no codigo; adopter adopta McpProposal). Cuarentena REVERSIBLE a docs/archive/_graveyard/2026-06-25-tech4-property-verifier/ con WHY.md. Rescatar cuando exista auto-codegen de source Python.

  - id: tech-5-starlette-deprecation
    title: "Silenciar/migrar el DeprecationWarning de Starlette TestClient (httpx)"
    why: >
      La suite emite 1 warning persistente: starlette.testclient usa httpx de forma deprecada ("install
      httpx2"). Ruido en cada corrida; conviene migrar o filtrar explГӯcitamente para mantener la salida limpia
      y no enmascarar warnings futuros reales.
    targets:
      - "tests/"
      - "pyproject.toml"
    acceptance: >
      La suite corre sin ese DeprecationWarning (vГӯa migraciГіn a httpx2 si es viable, o un filterwarnings
      acotado SOLO a ese warning concreto en la config de pytest, documentando por quГ©); suite verde; no se
      silencian otros warnings de forma genГ©rica.
    priority: 3
    status: done  # 2026-06-25 autobuild: filterwarnings acotado a starlette.exceptions.StarletteDeprecationWarning en pyproject; warning count 0, suite verde. No silencia otros.

  - id: tech-6-coldupdate-apply-patch-coverage
    title: "ColdUpdateManager._apply_patch: cobertura de fallos de git apply"
    why: >
      `_apply_patch` (cold_update_manager.py) aplica el patch al worktree con git apply, pero su manejo de
      fallos (patch corrupto, conflicto, git ausente) no tiene cobertura de tests dedicada. Es ruta de
      auto-modificaciГіn (ADR-025) вҖ” un fallo silencioso o un estado a medias es deuda tipo-1/2.
    targets:
      - "src/atlas/core/cold_update_manager.py"
    acceptance: >
      Tests que ejercitan: patch que no aplica limpio вҶ’ estado terminal/error explГӯcito sin dejar el worktree
      a medias; patch vГЎlido вҶ’ aplicado y verificable; (si aplica) rollback/limpieza del worktree en fallo.
      Cubren el caso real (no triviales); suite verde. Si se halla un fallo silencioso, anotarlo (no forzar fix).
    priority: 2
    status: done  # 2026-06-25 autobuild: tests/test_apply_patch_failures.py (8 tests git real): patch valido aplicado, corrupto/hunk-mismatch -> RuntimeError explicito, propuesta no almacenada. BUG hallado (worktree huerfano sin try/finally) -> tech-7.

  - id: tech-7-coldupdate-worktree-leak
    title: "ColdUpdateManager: worktree huГ©rfano cuando _apply_patch falla (leak de directorios)"
    why: >
      Hallado por los tests de tech-6: en `propose()`, `_create_worktree()` se llama ANTES de
      `_apply_patch()`. Si `_apply_patch` lanza (patch corrupto/no-aplicable), el worktree creado queda
      huГ©rfano en el store (`store/worktree-<id>/`) вҖ” sin try/finally ni limpieza, y el manager no guarda
      referencia para limpiarlo a posteriori. En repos git reales deja un `git worktree` registrado sin uso.
    targets:
