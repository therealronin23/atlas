  # === T0.5b paso 3 (2026-07-23, sesión maratón) — T4 — Vigilancia serendípica del ecosistema ===

  - id: t4-sentinel-tool-coherence
    title: "SentinelGate: coherencia descripción↔schema en tools adoptadas (capa 4 diferida, ADR-038)"
    why: >
      ADR-038 (docs/decisions/adr/adr_038_atlas_sentinel_gate.md) implementó 3 de 4 capas de
      vetting de adopción MCP (identidad+snapshot anti rug-pull, IOC/coherencia de comando,
      tiering read/write/shell_net/credential — las tres ✅ en sentinel_gate.py) pero dejó
      diferida la capa 4: "¿lo que el tool AFIRMA que hace (description) coincide con lo que
      PIDE (paths/endpoints/permisos de su inputSchema)?". Verificado contra código real
      (sentinel_gate.py:28, comentario "Diferido... coherencia AST profunda (reusar
      ast_guard)"): la capa 4 NO existe (solo _vet_tool con IOC de superficie, no comparación
      semántica descripción-vs-schema). Es el hueco real que le falta al pipeline T4.2
      (candidata→diseccionada→absorbida industrializado) para vetar candidatos MCP cuya
      descripción miente sobre lo que su schema realmente permite — el vector exacto de
      "tool poisoning" que ADR-036 cataloga como amenaza #1.
      Nota de investigación: la propia anotación del código dice "reusar ast_guard", pero
      `src/atlas/security/ast_guard.py` es un lint de AST de CÓDIGO Python (imports/calls
      bloqueados en codegen), no un comparador description↔schema de tools MCP — decide-con-
      hechos antes de construir: puede que aplique como inspiración de patrón (AST sobre el
      JSON del schema) pero no como reuso directo. Investigar primero, documentar la decisión,
      luego construir.
    targets:
      - "src/atlas/security/sentinel_gate.py"
    acceptance: >
      Nota de investigación corta (en el propio módulo o en un comentario de diseño) que
      decide si ast_guard aplica adaptado o si hace falta lógica nueva, y por qué. Capa de
      coherencia (`_vet_tool` o método nuevo) que detecte al menos un caso concreto de
      discrepancia: p.ej. una tool cuya `description` se declara "solo lectura" pero su
      `inputSchema` acepta parámetros de comando/escritura/URL arbitraria fuera de lo que la
      descripción sugiere → clasificada como discrepancia bloqueante (o `review` si la
      señal es débil, coherente con el resto de SentinelGate que ya usa fail-closed para
      `credential`). Test con un fixture de tool "maliciosa" (description benigna +
      inputSchema peligroso) que demuestre el veto, y un fixture de tool coherente que NO
      se bloquee (evitar falsos positivos que rompan la adopción normal); suite verde.
    priority: 3
    status: done  # 2026-07-23 (sesión maratón): commit 6239a2d

